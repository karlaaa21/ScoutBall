spring.application.name=Scoutball

# Puerto dinámico para Railway (vital para que funcione la URL pública)
server.port=${PORT:8080}
server.address=0.0.0.0

# Conexión a Base de Datos (Lee las variables de Railway, si no existen usa local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Scoutball?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Open-Meteo API (clima, sin API key)
openmeteo.base-url=${OPENMETEO_BASE_URL:https://api.open-meteo.com}

# Spring Security - JWT
jwt.secret=${JWT_SECRET:bibliotecaduoc-clave-secreta-jwt-2026-cambiar-en-produccion}

springdoc.enable-hateoas=false